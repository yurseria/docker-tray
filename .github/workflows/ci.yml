name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-tauri:
    name: Build Tauri
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npm run build

      - name: Create runtime placeholder
        run: mkdir -p src-tauri/runtime/colima/bin src-tauri/runtime/lima/bin src-tauri/runtime/docker/bin && touch src-tauri/runtime/colima/bin/.gitkeep src-tauri/runtime/lima/bin/.gitkeep src-tauri/runtime/docker/bin/.gitkeep

      - name: Check Rust
        working-directory: src-tauri
        run: cargo check
