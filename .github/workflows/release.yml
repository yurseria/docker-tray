name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build & Release (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Install Colima & Lima (for runtime bundling)
        run: brew install colima docker

      - name: Bundle runtime
        run: ./scripts/bundle-runtime.sh

      - name: Build Tauri app
        run: npx tauri build

      - name: Collect artifacts
        run: |
          mkdir -p release-out
          find src-tauri/target/release/bundle -type f -name "*.dmg" -exec cp {} release-out/ \;
          ls -la release-out/

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-out/*
          body: |
            ## Install

            ```bash
            curl -fsSL https://raw.githubusercontent.com/yurseria/docker-tray/main/scripts/install.sh | bash
            ```

            > **참고**: 이 앱은 서명되지 않았습니다. DMG를 직접 다운로드한 경우:
            > ```bash
            > xattr -rd com.apple.quarantine /Applications/Docker\ Tray.app
            > ```
